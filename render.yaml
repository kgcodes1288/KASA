databases:
  - name: cleanstay-db
    plan: free
    databaseName: cleanstay
    user: cleanstay

services:
  - type: web
    name: cleanstay-api
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cleanstay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false

  - type: web
    name: cleanstay-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
